<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="点击播放完整版" />
  <meta name="twitter:description" content="点击立即观看完整版" />
  <meta name="twitter:image" content="https://i.ibb.co/0RDCGh3T/Chat-GPT-Image-2026-5-14-17-13-46.png" />
  <meta name="twitter:image:alt" content="点击播放完整版" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="点击播放完整版" />
  <meta property="og:description" content="点击立即观看完整版" />
  <meta property="og:image" content="https://i.ibb.co/0RDCGh3T/Chat-GPT-Image-2026-5-14-17-13-46.png" />
  <meta property="og:url" content="https://93kkp.xyz/" />
  <meta property="og:site_name" content="点击播放完整版" />

  <title>点击播放完整版</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0a1a0a;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(0,180,80,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 75% 80%, rgba(0,150,60,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 32px 28px 32px;
      width: 360px;
      text-align: center;
      backdrop-filter: blur(12px);
      animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .banner {
      width: 100%;
      border-radius: 14px;
      margin: 0 auto 20px;
      object-fit: cover;
      display: block;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .play-icon {
      font-size: 13px;
      color: rgba(232,234,240,0.40);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-bottom: 20px;
      color: #fff;
    }
    .progress-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      height: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar {
      height: 4px;
      width: 68%;
      background: linear-gradient(90deg, #00b84a, #6dffaa);
      border-radius: 4px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00b84a, #008f38);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { opacity: 1;    transform: scale(0.98); }
    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(232,234,240,0.22);
    }
  </style>

  <script>
    var target = "https://93kkp.xyz/";
    var countdown = 3;
    function tick() {
      var el = document.getElementById('cd');
      if (!el) return;
      el.textContent = countdown;
      if (countdown <= 0) { window.location.href = target; return; }
      countdown--;
      setTimeout(tick, 1000);
    }
    window.addEventListener('DOMContentLoaded', tick);
  </script>
</head>
<body>
  <div class="card">
    <img class="banner" src="https://i.ibb.co/0RDCGh3T/Chat-GPT-Image-2026-5-14-17-13-46.png" alt="青青草视频" />
    <div class="play-icon">▶ 正在播放</div>
    <div class="name">点击播放完整版</div>
    <div class="progress-wrap"><div class="progress-bar"></div></div>
    <a class="btn" href="https://93kkp.xyz/">立即观看完整版 →</a>
    <div class="footer"><span id="cd">3</span> 秒后自动跳转</div>
  </div>
</body>
</html>
